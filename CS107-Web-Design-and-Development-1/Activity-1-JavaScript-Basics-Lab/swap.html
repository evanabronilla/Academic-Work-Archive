<!DOCTYPE html>
<html>
<head>
  <title>Swap Two Numbers</title>
</head>
<body>
  <h2>Swap Two Numbers</h2>
  <script>
    function swapValues(a, b) {
      document.write("Input: " + a + ", " + b + "<br>");
      var temp = a;
      a = b;
      b = temp;
      document.write("Output: " + a + ", " + b);
    }

    swapValues(90, 60);
  </script>
</body>
</html>
