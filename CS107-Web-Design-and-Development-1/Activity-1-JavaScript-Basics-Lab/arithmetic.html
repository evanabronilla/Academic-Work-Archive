<!DOCTYPE html>
<html>
<head>
    <title>Arithmetic Operations</title>
</head>
<body>
    <h2>Arithmetic Operations</h2>
    <script>
        let num1 = 48;
        let num2 = 17;

        let sum = num1 + num2;
        let difference = num1 - num2;
        let product = num1 * num2;
        let quotient = num1 / num2;
        let average = (num1 + num2) / 2;
        let max = (num1 > num2) ? num1 : num2;
        let min = (num1 < num2) ? num1 : num2;

        document.write("First Integer: " + num1 + "<br>");
        document.write("Second Integer: " + num2 + "<br>");
        document.write("Sum: " + sum + "<br>");
        document.write("Difference: " + difference + "<br>");
        document.write("Product: " + product + "<br>");
        document.write("Quotient: " + quotient + "<br>");
        document.write("Average: " + average + "<br>");
        document.write("Max integer: " + max + "<br>");
        document.write("Min integer: " + min + "<br>");
    </script>
</body>
</html>
